<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Smart Expense Tracker Architecture Diagram</title>
<desc>MVVM Architecture showing UI Layer, ViewModel Layer, Repository Layer, and Data Layer</desc>

<style>
  text { font-family: Arial, sans-serif; }
  .layer-title { font-size: 14px; font-weight: bold; fill: #1a1a2e; }
