</style>

<!-- Background -->
<rect width="680" height="820" fill="#f8f9fa" rx="12"/>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Smart Expense Tracker — MVVM Architecture</text>

